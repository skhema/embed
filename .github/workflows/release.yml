# Auto-generated by the Skhema package mirror export — do not edit by hand.
# Publishes this package to npm with provenance via a trusted publisher (OIDC).
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# One publish at a time; never cancel an in-flight release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest # GitHub-hosted runner required for OIDC provenance
    environment: npm-publish # must match the package's trusted-publisher config
    permissions:
      id-token: write # mint the OIDC token npm exchanges for a publish token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0" # >= 22.14 required by npm OIDC publishing
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to OIDC-capable version
        run: |
          npm install -g npm@11 # >= 11.5.1 needed for OIDC; npm@12 needs newer node
          npm --version

      - name: Read package identity
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already on npm (idempotent — no version burn)
        id: guard
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} already published — skipping"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.already == 'false'
        run: npm install --no-audit --no-fund

      - name: Build from source
        if: steps.guard.outputs.already == 'false'
        run: npm run build

      - name: Publish with provenance
        if: steps.guard.outputs.already == 'false'
        # --ignore-scripts: the build above already ran; skip lifecycle scripts so
        # nothing (e.g. a clean step) can undo it. Provenance is auto-attested from
        # the OIDC identity of this public repo + workflow.
        run: npm publish --provenance --access public --ignore-scripts
